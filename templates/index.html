<!DOCTYPE html>
<html>
<head>
    <title>MASTER CF TOOL</title>
</head>

<body style="font-family: Arial; text-align:center; background:#f2f6f2;">

<h2>MASTER COMMUNITY FOREST GIS TOOL</h2>

<form action="/upload" method="post" enctype="multipart/form-data">

    <br>

    <input type="file" name="file" required>

    <br><br>

    <label>Mode:</label>
    <select name="mode">
        <option value="comp">Compartment CF</option>
        <option value="single">Single Forest CF</option>
        <option value="points">Sample Points</option>
    </select>

    <br><br>

    <label>CRS:</label>
    <select name="crs">
        <option value="45">UTM 45N</option>
        <option value="44">UTM 44N</option>
    </select>

    <br><br>

    <button type="submit" style="padding:10px 20px; background:green; color:white;">
        RUN TOOL
    </button>

</form>

</body>
</html>
