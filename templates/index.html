<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Engine Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0d12;
color:#e5e7eb;
}

/* LAYOUT */
.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:380px;
padding:20px;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
overflow:auto;
}

/* TITLE */
h1{
font-size:20px;
margin-bottom:15px;
}

/* GROUP BUTTONS */
.group{
padding:12px;
margin:8px 0;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:0.3s;
}

.group:hover{
transform:translateY(-2px);
}

.active{
background:#4f46e5;
}

/* INPUTS */
input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
}

/* SECTIONS */
.section{
display:none;
margin-top:10px;
padding-top:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4f46e5;
}

/* PREVIEW */
.preview{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.box{
width:90%;
height:85%;
border-radius:14px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
}

img{
max-width:100%;
max-height:80%;
display:none;
border-radius:10px;
}

a{
margin-top:10px;
color:#60a5fa;
display:none;
cursor:pointer;
}

small{
color:#9ca3af;
font-size:12px;
}

.status{
margin-top:10px;
color:#9ca3af;
}
</style>
</head>

<body>

<div class="app">

<!-- LEFT PANEL -->
<div class="sidebar">

<h1>🌲 GIS Engine Pro</h1>

<div class="group active" onclick="setMode('A')">Group A — Forest Boundary</div>
<div class="group" onclick="setMode('B')">Group B — Compartment Mapping</div>
<div class="group" onclick="setMode('C')">Group C — Sample Grid</div>
<div class="group" onclick="setMode('D')">Group D — Auto Forest Split</div>

<input type="file" id="file">

<!-- FOREST ONLY A -->
<div id="forestBox" class="section">
<small>Forest Name (Group A only)</small>
<input id="forest" placeholder="Forest name">
</div>

<!-- UTM -->
<select id="zone">
<option value="44">UTM 44N</option>
<option value="45">UTM 45N</option>
</select>

<!-- GRID ONLY C -->
<div id="gridBox" class="section">
<small>Grid Settings (Group C only)</small>
<input id="w" placeholder="Cell Width (m)">
<input id="h" placeholder="Cell Height (m)">
<input id="rows" placeholder="Rows">
<input id="cols" placeholder="Columns">
</div>

<button onclick="run()">Run Processing</button>

<div class="status" id="status"></div>

</div>

<!-- RIGHT PREVIEW -->
<div class="preview">
<div class="box">

<img id="img">
<a id="download">Download ZIP</a>
<div id="text">Preview Area</div>

</div>
</div>

</div>

<script>

let mode="A";

function setMode(m){

mode=m;

document.querySelectorAll(".group").forEach(g=>g.classList.remove("active"));
event.target.classList.add("active");

document.getElementById("img").style.display="none";
document.getElementById("download").style.display="none";
document.getElementById("text").innerText="Preview Area";

/* reset */
document.getElementById("forestBox").style.display="none";
document.getElementById("gridBox").style.display="none";

if(mode==="A"){
document.getElementById("forestBox").style.display="block";
}

if(mode==="C"){
document.getElementById("gridBox").style.display="block";
}

}

async function run(){

if(!document.getElementById("file").files[0]){
alert("Upload file first");
return;
}

document.getElementById("status").innerText="Processing...";

let fd=new FormData();

fd.append("file",document.getElementById("file").files[0]);
fd.append("mode",mode);
fd.append("zone",document.getElementById("zone").value);

if(mode==="A"){
fd.append("forest",document.getElementById("forest").value || "FOREST");
}

if(mode==="C"){
fd.append("w",document.getElementById("w").value || 50);
fd.append("h",document.getElementById("h").value || 50);
fd.append("rows",document.getElementById("rows").value || 10);
fd.append("cols",document.getElementById("cols").value || 10);
}

let res=await fetch("/upload",{method:"POST",body:fd});
let blob=await res.blob();

/* DOWNLOAD */
let url=URL.createObjectURL(blob);

let dl=document.getElementById("download");
dl.href=url;
dl.style.display="block";
dl.innerText="⬇ Download ZIP";

/* ================= FIXED PREVIEW ================= */
setTimeout(()=>{

let img=document.getElementById("img");

/* cache-busting + guaranteed reload */
img.src="/outputs/"+mode+"_preview.png?"+Date.now();

img.onload = () => {
    document.getElementById("text").innerText="Preview Ready ✔";
    img.style.display="block";
};

img.onerror = () => {
    document.getElementById("text").innerText="Preview not found ❌ (check backend)";
};

},500);

document.getElementById("status").innerText="Done";

}

</script>

</body>
</html>
