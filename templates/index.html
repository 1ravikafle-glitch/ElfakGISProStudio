<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elfak GIS Engine Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0d12;
color:#e5e7eb;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:380px;
padding:18px;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
overflow:auto;
}

h1{
font-size:20px;
margin-bottom:18px;
}

.group{
padding:14px;
margin:10px 0;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:0.25s;
}

.group:hover{ background:#1f2937; }
.active{ background:#4f46e5; }

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.05);
color:white;
box-sizing:border-box;
}

.section{
display:none;
margin-top:10px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.03);
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{ background:#4f46e5; }

.status{ margin-top:10px; color:#9ca3af; font-size:13px; }

.progress-bar{
width:100%;
height:8px;
background:#1f2937;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
width:0%;
background:#4f46e5;
}

.preview{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.box{
width:95%;
height:92%;
border-radius:16px;
background:#111827;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

img{
max-width:100%;
max-height:100%;
display:none;
object-fit:contain;
}

a{
margin-top:10px;
color:#60a5fa;
display:none;
cursor:pointer;
}
/* small label styling */
small{
color:#9ca3af;
display:block;
margin-top:6px;

#text{ color:#9ca3af; }
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">

<h1>🌲 GIS Engine Pro</h1>

<div class="group active" onclick="setMode('A', this)">
Group A — Forest Boundry
<small>X, Y, Order required</small>
</div>

<div class="group" onclick="setMode('B', this)">
Group B — Segmented Forest
<small>X, Y, Order,Forest, Compartment required</small>
</div>

<div class="group" onclick="setMode('C', this)">
Group C — Sample Plot Grid
<small>Automatic spatial sampling</small>
</div>

<div class="group" onclick="setMode('D', this)">
Group D — Multi-Forest Mode
<small>Advanced processing</small>
</div>

<input type="file" id="file">

<!-- COLUMN FILTER (FIXED) -->
<div id="columnBox" class="section" style="display:block;">
<small>Column Mapping</small>
<select id="xCol"></select>
<select id="yCol"></select>
<select id="orderCol"></select>
</div>

<div id="forestBox" class="section">
<input id="forest" placeholder="Forest name">
</div>

<select id="zone">
<option value="44">UTM 44N</option>
<option value="45">UTM 45N</option>
</select>

<div id="gridBox" class="section">
<input type="number" id="w" value="50">
<input type="number" id="h" value="50">
<input type="number" id="rows" value="10">
<input type="number" id="cols" value="10">
</div>

<button onclick="run()">Run Processing</button>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div class="status" id="status">Ready</div>

</div>

<!-- PREVIEW -->
<div class="preview">
<div class="box">
<div id="text">Preview Area</div>
<img id="img">
<a id="download">⬇ Download ZIP</a>
</div>
</div>

</div>

<script>
let mode = "A";
let loadController = { aborted:false, timeout:null };

/* FIXED COLUMN LOADING */
document.getElementById("file").addEventListener("change", async function () {
    let file = this.files[0];
    if (!file) return;

    let fd = new FormData();
    fd.append("file", file);

    let res = await fetch("/get-columns", { method:"POST", body:fd });
    let cols = await res.json();

    let xSel = document.getElementById("xCol");
    let ySel = document.getElementById("yCol");
    let oSel = document.getElementById("orderCol");

    xSel.innerHTML = "";
    ySel.innerHTML = "";
    oSel.innerHTML = "";

    cols.forEach(c=>{
        xSel.innerHTML += `<option value="${c}">${c}</option>`;
        ySel.innerHTML += `<option value="${c}">${c}</option>`;
        oSel.innerHTML += `<option value="${c}">${c}</option>`;
    });
});

/* MODE SWITCH */
function setMode(m, el){
mode = m;
document.querySelectorAll(".group").forEach(g=>g.classList.remove("active"));
el.classList.add("active");

document.getElementById("forestBox").style.display =
(m==="A") ? "block" : "none";

document.getElementById("gridBox").style.display =
(m==="C") ? "block" : "none";

document.getElementById("columnBox").style.display =
(m==="A"||m==="B"||m==="D") ? "block" : "none";
}

/* RUN */
async function run(){

let file = document.getElementById("file").files[0];
if(!file) return alert("Upload file");

let fd = new FormData();
fd.append("file", file);
fd.append("mode", mode);
fd.append("zone", document.getElementById("zone").value);

if(mode==="A"||mode==="B"||mode==="D"){
fd.append("forest", document.getElementById("forest").value || "FOREST");
fd.append("mapping", JSON.stringify({
    X: xCol.value,
    Y: yCol.value,
    Order: orderCol.value
}));
}

if(mode==="C"){
fd.append("w", w.value);
fd.append("h", h.value);
fd.append("rows", rows.value);
fd.append("cols", cols.value);
}

let res = await fetch("/upload",{method:"POST",body:fd});
let data = await res.json();

progress.style.width="100%";
status.innerText="Done ✔";

download.href=data.download;
download.style.display="block";

loadPreview(data.run_id);
}

/* PREVIEW */
function loadPreview(id){
let img=document.getElementById("img");
let text=document.getElementById("text");

img.src="/outputs/"+id+"/output.png?t="+Date.now();
img.style.display="block";
text.innerText="Preview Ready ✔";
}
</script>

</body>
</html>
