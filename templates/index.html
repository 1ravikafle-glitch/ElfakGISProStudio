<!DOCTYPE html>
<html>
<head>
<title>Forest GIS Tool</title>
<style>
body { font-family: Arial; background:#f2f6f2; text-align:center; }
.container { width:60%; margin:auto; background:white; padding:20px; border-radius:10px; }
input, select { padding:10px; margin:10px; width:80%; }
button { background:green; color:white; padding:10px 20px; border:none; }
img { margin-top:20px; width:90%; }
</style>
</head>

<body>

<div class="container">

<h2>🌲 Forest GIS Engine</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file" required><br>

<select name="mode">
<option value="boundary">Whole Boundary</option>
<option value="sample">Sample Plot (Fishnet)</option>
</select><br>

<select name="zone">
<option value="45">UTM 45N</option>
<option value="44">UTM 44N</option>
</select><br>

<input type="number" name="intensity" step="0.1" value="0.5" placeholder="Sampling Intensity %">
<input type="number" name="plot_size" value="500" placeholder="Plot size m²">

<br>
<button type="submit">Generate</button>

</form>

{% if map_image %}
<h3>Preview</h3>
<img src="/{{ map_image }}">
{% endif %}

{% if download_file %}
<br>
<a href="/{{ download_file }}" download>
<button>Download ZIP</button>
</a>
{% endif %}

</div>

</body>
</html>
