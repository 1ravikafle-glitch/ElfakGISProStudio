<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>File Upload with Preview & Download</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  h2 { margin-top: 40px; }
  input[type="file"], select, input[type="text"] {
    display: block; margin: 10px 0; padding: 8px; width: 300px; }
  button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
  .preview { margin-top: 20px; }
  .box { padding: 10px; border: 2px dashed #ccc; border-radius: 12px; min-height: 200px; display: flex; align-items: center; justify-content: center; }
  #preview img { max-width: 100%; border-radius: 12px; }
</style>
</head>
<body>

<h1>File Processing Tool</h1>

<label for="file">Select a file:</label>
<input type="file" id="file" />

<label for="mode">Select Mode:</label>
<select id="mode">
  <option value="A">Mode A</option>
  <option value="B">Mode B</option>
  <option value="C">Mode C</option>
</select>

<label for="zone">Zone:</label>
<input type="text" id="zone" placeholder="Enter zone" />

<!-- Additional inputs based on mode -->
<div id="additionalInputs"></div>

<button onclick="run()">Run</button>

<div class="preview">
  <div class="box" id="preview">
    <div id="previewContent">✔ Processing Complete - Preview will appear here</div>
    <a id="downloadLink" style="display:none; margin-top:10px; padding:10px 20px; border:none; border-radius:8px; background:#ff7f50; color:#fff; font-weight:600; cursor:pointer; text-decoration:none;">Download Processed File</a>
  </div>
</div>

<script>
  const modeSelect = document.getElementById('mode');
  const additionalInputsDiv = document.getElementById('additionalInputs');

modeSelect.addEventListener('change', () => {
  updateAdditionalInputs();
});

function updateAdditionalInputs() {
  const mode = modeSelect.value;
  additionalInputsDiv.innerHTML = '';
  if (mode === 'A') {
    additionalInputsDiv.innerHTML = `
      <label for="forest">Forest:</label>
      <input type="text" id="forest" placeholder="Enter forest" />
    `;
  } else if (mode === 'C') {
    additionalInputsDiv.innerHTML = `
      <label for="source">Source:</label>
      <input type="text" id="source" placeholder="Enter source" />
      <label for="w">Width (w):</label>
      <input type="text" id="w" placeholder="Width" />
      <label for="h">Height (h):</label>
      <input type="text" id="h" placeholder="Height" />
      <label for="rows">Rows:</label>
      <input type="text" id="rows" placeholder="Rows" />
      <label for="cols">Columns:</label>
      <input type="text" id="cols" placeholder="Columns" />
    `;
  }
}

updateAdditionalInputs();

async function run() {
  const fileInput = document.getElementById('file');
  if (!fileInput.files.length) {
    alert('Please select a file.');
    return;
  }

  let fd = new FormData();
  fd.append("file", fileInput.files[0]);
  const mode = document.getElementById("mode").value;
  fd.append("mode", mode);
  fd.append("zone", document.getElementById("zone").value);

  if (mode === "A") {
    fd.append("forest", document.getElementById("forest").value);
  }

  if (mode === "C") {
    fd.append("source", document.getElementById("source").value);
    fd.append("w", document.getElementById("w").value);
    fd.append("h", document.getElementById("h").value);
    fd.append("rows", document.getElementById("rows").value);
    fd.append("cols", document.getElementById("cols").value);
  }

  try {
    const res = await fetch("/upload", { method: "POST", body: fd });
    const blob = await res.blob();

    // Generate URL for download
    const url = URL.createObjectURL(blob);

    // Setup download link
    const downloadLink = document.getElementById("downloadLink");
    downloadLink.href = url;
    downloadLink.download = "processed_file"; // You can set a dynamic filename if needed
    downloadLink.style.display = "inline-block";

    // Handle preview based on file type
    const previewContent = document.getElementById("previewContent");
    previewContent.innerHTML = ""; // Clear previous preview

    if (blob.type.startsWith("image/")) {
      const img = document.createElement("img");
      img.src = url;
      previewContent.appendChild(img);
    } else if (blob.type.startsWith("text/")) {
      const reader = new FileReader();
      reader.onload = () => {
        const textPreview = document.createElement("pre");
        textPreview.textContent = reader.result;
        textPreview.style.whiteSpace = "pre-wrap";
        textPreview.style.maxHeight = "200px";
        textPreview.style.overflowY = "auto";
        previewContent.appendChild(textPreview);
      };
      reader.readAsText(blob);
    } else {
      previewContent.textContent = "Preview not available.";
    }

  } catch (error) {
    document.getElementById("previewContent").textContent = "❌ Error during processing.";
    console.error(error);
  }
}
</script>

</body>
</html>
