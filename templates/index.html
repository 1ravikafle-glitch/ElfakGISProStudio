<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ElfakGIS Engine Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f3d2e, #14532d);
        }
    </style>
</head>

<body class="text-white min-h-screen">

<div class="max-w-6xl mx-auto p-6">

    <!-- HEADER -->
    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold">🌲 ElfakGIS Engine Workspace</h1>
        <p class="text-sm text-gray-200">Forest Boundary • Compartment • Sample Plot Generator</p>
    </div>

    <!-- FORM CARD -->
    <div class="bg-white text-black rounded-2xl shadow-xl p-6 grid md:grid-cols-2 gap-6">

        <form action="/upload" method="POST" enctype="multipart/form-data" class="space-y-4">

            <!-- FILE -->
            <div>
                <label class="font-semibold">Upload Excel File</label>
                <input type="file" name="file" required class="w-full border p-2 rounded">
            </div>

            <!-- MODE -->
            <div>
                <label class="font-semibold">Processing Mode</label>
                <select name="mode" id="mode" class="w-full border p-2 rounded">
                    <option value="boundary">Boundary of Whole Forest</option>
                    <option value="compartment">Boundary of Segmented Forest</option>
                    <option value="sample">Sample Plot Design</option>
                </select>
            </div>

            <!-- ZONE -->
            <div>
                <label class="font-semibold">UTM Zone</label>
                <select name="zone" class="w-full border p-2 rounded">
                    <option value="44">44N</option>
                    <option value="45">45N</option>
                </select>
            </div>

            <!-- ORDER MODE -->
            <div>
                <label class="font-semibold">Point Order Mode</label>
                <select name="order_mode" class="w-full border p-2 rounded">
                    <option value="auto">Auto Sort</option>
                    <option value="manual">Manual Order</option>
                </select>
            </div>

            <!-- SAMPLE SETTINGS (HIDDEN BY DEFAULT) -->
            <div id="sample-settings" class="hidden space-y-4">

                <div>
                    <label class="font-semibold">Sampling Intensity (0–1)</label>
                    <input type="number" step="0.1" min="0" max="1"
                        name="intensity" value="0.5"
                        class="w-full border p-2 rounded">
                </div>

                <div>
                    <label class="font-semibold">Plot Size (m²)</label>
                    <input type="number" name="plot_size" value="500"
                        class="w-full border p-2 rounded">
                </div>

            </div>

            <!-- SUBMIT -->
            <button type="submit"
                class="w-full bg-green-700 hover:bg-green-800 text-white py-3 rounded-xl font-bold">
                🚀 Process GIS Data
            </button>

        </form>

        <!-- INFO PANEL -->
        <div class="bg-green-50 p-4 rounded-xl text-black">
            <h2 class="font-bold text-lg mb-2">📌 How it works</h2>
            <ul class="text-sm space-y-2">
                <li>✔ Upload Excel with X, Y, Forest columns</li>
                <li>✔ Choose processing mode</li>
                <li>✔ System generates GIS outputs</li>
                <li>✔ Download ZIP + view map</li>
            </ul>
        </div>

    </div>

</div>

<!-- ================= JS TOGGLE ================= -->
<script>
    const mode = document.getElementById("mode");
    const sampleBox = document.getElementById("sample-settings");

    function toggleSample() {
        if (mode.value === "sample") {
            sampleBox.classList.remove("hidden");
        } else {
            sampleBox.classList.add("hidden");
        }
    }

    mode.addEventListener("change", toggleSample);
    window.onload = toggleSample;
</script>

</body>
</html>
