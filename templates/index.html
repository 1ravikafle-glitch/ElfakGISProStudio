<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Elfak GIS Engine Pro</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b0d12;
color:#e5e7eb;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:380px;
padding:20px;
background:rgba(255,255,255,0.03);
border-right:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
overflow:auto;
}

h1{
font-size:20px;
margin-bottom:15px;
}

.group{
padding:12px;
margin:8px 0;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:0.3s;
}

.group:hover{
background:#374151;
transform:translateY(-2px);
}

.active{
background:#4f46e5;
box-shadow:0 0 20px rgba(79,70,229,.4);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.08);
background:rgba(255,255,255,0.05);
color:white;
outline:none;
box-sizing:border-box;
}

.section{
display:none;
margin-top:10px;
padding-top:10px;
border-top:1px solid rgba(255,255,255,0.08);
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4f46e5;
}

.status{
margin-top:10px;
color:#9ca3af;
font-size:13px;
}

.progress-bar{
width:100%;
height:8px;
background:#1f2937;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:100%;
width:0%;
background:#4f46e5;
transition:0.3s;
}

.preview{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.box{
width:95%;
height:92%;
border-radius:16px;
background:#111827;
border:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
padding:20px;
box-sizing:border-box;
}

img{
max-width:100%;
max-height:100%;
display:none;
object-fit:contain;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

a{
margin-top:10px;
color:#60a5fa;
display:none;
cursor:pointer;
}

#text{
color:#9ca3af;
}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h1>🌲 GIS Engine Pro</h1>

<div class="group active" onclick="setMode('A', this)">Group A — Whole Forest Boundary Map</div>
<div class="group" onclick="setMode('B', this)">Group B — Segmented Forest Boundary Map</div>
<div class="group" onclick="setMode('C', this)">Group C — Sample Plot</div>
<div class="group" onclick="setMode('D', this)">Group D — Complex Version of Group'A'</div>

<input type="file" id="file">

<div id="forestBox" class="section">
<small>Forest Name (Group A only)</small>
<input id="forest" placeholder="Forest name">
</div>

<select id="zone">
<option value="44">UTM 44N</option>
<option value="45">UTM 45N</option>
</select>

<!-- ✅ FIX: Group C type selector added -->
<div id="gridBox" class="section">
<small>Grid Settings (Group C only)</small>

<select id="c_type">
    <option value="auto">Auto Detect (A / B)</option>
    <option value="A">Force Group A Style</option>
    <option value="B">Force Group B Style</option>
</select>

<input type="number" id="w" value="50">
<input type="number" id="h" value="50">
<input type="number" id="rows" value="10">
<input type="number" id="cols" value="10">
</div>

<button onclick="run()">Run Processing</button>

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div class="status" id="status">Ready</div>

</div>

<div class="preview">
<div class="box">

<div id="text">Preview Area</div>
<img id="img">
<a id="download">⬇ Download ZIP</a>

</div>
</div>

</div>

<script>
let mode = "A";

let loadController = {
    aborted: false,
    timeout: null
};

let progressInterval = null;

/* ---------------- RESET ---------------- */
function resetProcessing(){

    loadController.aborted = true;

    if(loadController.timeout) clearTimeout(loadController.timeout);
    if(progressInterval) clearInterval(progressInterval);

    loadController = { aborted:false, timeout:null };

    document.getElementById("img").style.display = "none";
    document.getElementById("img").src = "";

    document.getElementById("download").style.display = "none";

    document.getElementById("status").innerText = "Ready";

    document.getElementById("progress").style.width = "0%";

    document.getElementById("text").innerText = "Preview Reset...";
}

/* ---------------- MODE SWITCH ---------------- */
function setMode(m, el){
    mode = m;

    resetProcessing();

    document.querySelectorAll(".group")
        .forEach(g => g.classList.remove("active"));

    el.classList.add("active");

    document.getElementById("forestBox").style.display = "none";
    document.getElementById("gridBox").style.display = "none";

    if(mode === "A") document.getElementById("forestBox").style.display = "block";
    if(mode === "C") document.getElementById("gridBox").style.display = "block";
}

/* ---------------- PROGRESS SIM ---------------- */
function startProgress(){

    let progress = 0;
    let bar = document.getElementById("progress");

    progressInterval = setInterval(() => {

        if(progress >= 95){
            clearInterval(progressInterval);
            return;
        }

        progress += Math.random() * 10;
        bar.style.width = progress + "%";

        document.getElementById("status").innerText =
            "Processing... " + Math.floor(progress) + "%";

    }, 400);
}

/* ---------------- PREVIEW ---------------- */
function loadPreview(run_id){

    let img = document.getElementById("img");
    let text = document.getElementById("text");
    let attempts = 0;

    function tryLoad(){

        if(loadController.aborted) return;

        if(attempts > 10){
            text.innerText = "Preview not found ❌";
            return;
        }

        img.src = "/outputs/" + run_id + "/output.png?t=" + Date.now();

        attempts++;

        loadController.timeout = setTimeout(() => {

            if(loadController.aborted) return;

            if(img.naturalWidth === 0){
                tryLoad();
            } else {
                img.style.display = "block";
                text.innerText = "Preview Ready ✔";
            }

        }, 1000);
    }

    tryLoad();
}

/* ---------------- RUN ---------------- */
async function run(){

    resetProcessing();

    let file = document.getElementById("file").files[0];
    if(!file){
        alert("Upload file first");
        return;
    }

    let status = document.getElementById("status");
    status.innerText = "Uploading...";

    let fd = new FormData();
    fd.append("file", file);
    fd.append("mode", mode);
    fd.append("zone", document.getElementById("zone").value);

    if(mode === "A"){
        fd.append("forest", document.getElementById("forest").value || "FOREST");
    }

    if(mode === "C"){
        fd.append("w", document.getElementById("w").value || 50);
        fd.append("h", document.getElementById("h").value || 50);
        fd.append("rows", document.getElementById("rows").value || 10);
        fd.append("cols", document.getElementById("cols").value || 10);

        // ✅ FIX: send data type selection
        fd.append("c_type", document.getElementById("c_type").value);
    }

    status.innerText = "Processing...";
    startProgress();

    let res = await fetch("/upload", {
        method: "POST",
        body: fd
    });

    let data = await res.json();

    document.getElementById("progress").style.width = "100%";
    document.getElementById("status").innerText = "Completed ✔";

    let dl = document.getElementById("download");
    dl.href = data.download;
    dl.download = "output.zip";
    dl.style.display = "block";

    loadPreview(data.run_id);
}
</script>

</body>
</html>
