<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CF Boundary Generator</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f7;
            margin: 0;
        }

        .container {
            width: 600px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .box {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin: 8px 0;
        }

        input[type="file"] {
            width: 100%;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2E86C1;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1b4f72;
        }

        .title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .status {
            text-align: center;
            margin-top: 10px;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Community Forest GIS Tool</h2>

    <form action="/upload" method="post" enctype="multipart/form-data">

        <!-- FILE -->
        <div class="box">
            <div class="title">1. Upload Excel File</div>
            <input type="file" name="file" required>
        </div>

        <!-- MODE -->
        <div class="box">
            <div class="title">2. Select Mode</div>

            <label>
                <input type="radio" name="mode" value="whole" checked>
                Whole Forest Boundary (Point → Line → Polygon)
            </label>

            <label>
                <input type="radio" name="mode" value="part">
                Part Forest Boundary (Compartment Wise)
            </label>
        </div>

        <!-- ZONE -->
        <div class="box">
            <div class="title">3. UTM Zone</div>

            <label>
                <input type="radio" name="zone" value="44">
                Zone 44N (EPSG:32644)
            </label>

            <label>
                <input type="radio" name="zone" value="45" checked>
                Zone 45N (EPSG:32645)
            </label>
        </div>

        <!-- SUBMIT -->
        <div class="box">
            <button type="submit">Run Processing</button>
        </div>

    </form>

    <div class="status">
        Ready
    </div>

</div>

</body>
</html>
