<!DOCTYPE html>
<html>
<head>
<title>Forest GIS Tool</title>

<style>
body {font-family: Arial; background:#eef5ee; text-align:center;}
.container {width:60%; margin:auto; background:white; padding:20px; border-radius:10px;}
input, select {padding:10px; width:80%; margin:8px;}
button {background:green; color:white; padding:10px 20px; border:none;}
</style>
</head>

<body>

<div class="container">

<h2>🌲 Forest GIS Engine</h2>

<h4>Excel Format Required:</h4>
<p>
<b>Whole:</b> Order | Forest | X | Y <br>
<b>Compartment:</b> Order | Forest | Compartment | X | Y
</p>

<form method="POST" action="/upload" enctype="multipart/form-data">

<input type="file" name="file" required><br>

<select name="mode">
<option value="boundary">Whole Forest</option>
<option value="compartment">Compartment Forest</option>
<option value="sample">Sample Plot (Fishnet)</option>
</select><br>

<select name="zone">
<option value="45">UTM 45N</option>
<option value="44">UTM 44N</option>
</select><br>

<select name="order_mode">
<option value="auto">Auto Reset Order</option>
<option value="manual">Keep Excel Order</option>
</select><br>

<input type="number" name="intensity" value="0.5" step="0.1" placeholder="Sampling Intensity %">
<input type="number" name="plot_size" value="500" placeholder="Plot size m²">

<br><br>

<button type="submit">Generate GIS Output</button>

</form>

{% if map_image %}
<h3>Preview</h3>
<img src="/{{ map_image }}">
{% endif %}

{% if download_file %}
<br><br>
<a href="/{{ download_file }}" download>
<button>Download ZIP</button>
</a>
{% endif %}

</div>

</body>
</html>
